<section class="py-24 bg-white dark:bg-dark-900 relative overflow-hidden transition-colors duration-500" id="join">
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#00000008_1px,transparent_1px),linear-gradient(to_bottom,#00000008_1px,transparent_1px)] dark:bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="text-center mb-16">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-600 dark:text-brand-400 text-xs font-bold uppercase tracking-wider mb-4">
                <span class="material-symbols-outlined text-sm">sports_esports</span>
                Join the Action
            </div>
            <h2 class="text-4xl md:text-5xl font-display font-bold text-slate-900 dark:text-white mb-4">
                Wie trete ich bei?
            </h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white dark:bg-dark-800 border border-slate-200 dark:border-white/5 p-8 rounded-3xl relative group hover:-translate-y-2 transition-all duration-300 shadow-xl dark:shadow-none">
                <div class="absolute -top-4 -left-4 w-12 h-12 bg-slate-900 dark:bg-dark-900 border border-white/10 rounded-xl flex items-center justify-center font-display font-bold text-xl text-white shadow-lg z-10 group-hover:scale-110 transition-transform">1</div>
                <div class="h-14 w-14 bg-blue-500/10 rounded-2xl flex items-center justify-center mb-6 text-blue-600 dark:text-blue-400 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300">
                    <span class="material-symbols-outlined text-3xl">play_circle</span>
                </div>
                <h3 class="text-xl font-black uppercase italic text-black dark:text-white mb-2">Minecraft Starten</h3>
                <p class="text-black/70 dark:text-slate-400 text-sm leading-relaxed font-bold">Starte deinen Launcher und wähle die neuste Version.</p>
            </div>

            <div class="bg-white dark:bg-dark-800 border border-slate-200 dark:border-white/5 p-8 rounded-3xl relative group hover:-translate-y-2 transition-all duration-300 shadow-xl dark:shadow-none">
                <div class="absolute -top-4 -left-4 w-12 h-12 bg-slate-900 dark:bg-dark-900 border border-white/10 rounded-xl flex items-center justify-center font-display font-bold text-xl text-white shadow-lg z-10 group-hover:scale-110 transition-transform">2</div>
                <div class="h-14 w-14 bg-purple-500/10 rounded-2xl flex items-center justify-center mb-6 text-purple-600 dark:text-purple-400 group-hover:bg-purple-600 group-hover:text-white transition-all duration-300">
                    <span class="material-symbols-outlined text-3xl">add_circle</span>
                </div>
                <h3 class="text-xl font-black uppercase italic text-black dark:text-white mb-2">Server hinzufügen</h3>
                <p class="text-black/70 dark:text-slate-400 text-sm leading-relaxed font-bold">Gehe auf "Mehrspieler" > "Server hinzufügen".</p>
            </div>

            <div class="bg-white dark:bg-dark-800 border-2 border-brand-500 p-8 rounded-3xl relative group hover:-translate-y-2 transition-all duration-300 shadow-2xl dark:shadow-[0_0_30px_rgba(14,165,233,0.1)]">
                <div class="absolute -top-4 -left-4 w-12 h-12 bg-brand-500 rounded-xl flex items-center justify-center font-display font-bold text-xl text-white shadow-lg z-10 group-hover:rotate-12 transition-transform">3</div>
                <div class="h-14 w-14 bg-brand-500/10 rounded-2xl flex items-center justify-center mb-6 text-brand-600 dark:text-brand-400 group-hover:bg-brand-500 group-hover:text-white transition-all duration-300">
                    <span class="material-symbols-outlined text-3xl">dns</span>
                </div>
                <h3 class="text-xl font-black uppercase italic text-slate-900 dark:text-white mb-3">IP Eingeben</h3>
                
                <div id="ip-box" class="bg-slate-100 dark:bg-dark-900 p-3 rounded-xl border border-slate-200 dark:border-white/10 flex items-center gap-2">
                    <code id="ip-display" class="flex-1 text-center font-mono text-brand-600 dark:text-brand-500 font-black tracking-tight">omadacraft.net</code>
                    <button id="copy-btn-step" class="p-2 bg-white dark:bg-dark-700 hover:bg-brand-500 hover:text-white text-slate-500 dark:text-slate-300 rounded-lg shadow-sm border border-slate-200 dark:border-none transition-all" onclick="copyIPStep()">
                        <span id="copy-icon-step" class="material-symbols-outlined text-sm">content_copy</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
