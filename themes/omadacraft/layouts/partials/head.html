<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>{{ .Title }} - OmadaCraft Network</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">

<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                    display: ['Rajdhani', 'sans-serif'],
                },
                colors: {
                    brand: {
                        50: '#f0f9ff',
                        100: '#e0f2fe',
                        400: '#38bdf8',
                        500: '#0ea5e9',
                        600: '#0284c7',
                        900: '#0c4a6e',
                    },
                    dark: {
                        900: '#0f172a',
                        800: '#1e293b',
                        700: '#334155',
                    }
                },
                animation: {
                    'float': 'float 6s ease-in-out infinite',
                },
                keyframes: {
                    float: {
                        '0%, 100%': { transform: 'translateY(0)' },
                        '50%': { transform: 'translateY(-10px)' },
                    }
                }
            }
        }
    }
</script>

<style>
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; }
    
    .minecraft-btn {
        image-rendering: pixelated;
        box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.2);
    }
    .minecraft-btn:active {
        box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.2);
        transform: translateY(2px);
    }
</style>
<link rel="icon" type="image/png" href="/images/favicon.png">
