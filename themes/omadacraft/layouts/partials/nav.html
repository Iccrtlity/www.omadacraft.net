<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; }

        .nav-sticky-container {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: transparent;
            pointer-events: none;
            padding-top: var(--safe-top);
        }

        #navbar-desktop, .mobile-nav-root, #sidebar-portal, .search-results-dropdown {
            pointer-events: auto;
        }

        @media (min-width: 768px) {
            #navbar-desktop {
                position: relative; /* wichtig für :before */
                display: flex !important;
                margin: 20px auto;
                max-width: 95%;
                width: 1200px;
                height: 75px;
                background: rgba(15, 15, 15, 0.85); /* bleibt sichtbar */
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 24px;
                padding: 0 25px;
                align-items: center;
                justify-content: space-between;

                /* Kein backdrop-filter mehr hier */
                will-change: transform;
                transform: translate3d(0, 0, 0);
            }

            /* Neues Pseudo-Element für den Blur */
            #navbar-desktop::before {
                content: "";
                position: absolute;
                inset: 0;
                background: inherit; /* erbt das rgba vom Parent */
                backdrop-filter: blur(12px) saturate(180%);
                border-radius: 24px;
                z-index: -1; /* hinter dem Inhalt */
                pointer-events: none;
            }

            .nav-link-desktop {
                color: #94a3b8;
                font-size: 0.75rem;
                font-weight: 700;
                text-transform: uppercase;
                padding: 0.5rem 0.75rem;
                position: relative; /* falls nötig */
                z-index: 1;
            }

            .nav-link-desktop:hover { color: #3b82f6; }
        }

        @media (max-width: 767px) {
            .mobile-nav-root { display: block; padding: 12px 16px; }
            .mbl-card-frame {
                background: rgba(17, 17, 17, 0.9);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 2rem;
                overflow: hidden;
            }
        }

        /* Rainbow glowing effect – etwas entschärft */
        .rainbow-text {
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            background-size: 300% 300%; /* etwas kleiner → weniger hektisch */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 10s ease infinite; /* noch langsamer */
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.3);
        }

        @keyframes rainbow {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

<body>

<div class="nav-sticky-container">

    <!-- DESKTOP NAV -->
    <nav id="navbar-desktop" class="hidden md:flex">
        <a class="flex items-center gap-3 group" href="/">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                <span class="material-symbols-outlined text-white">shield</span>
            </div>
            <span class="font-bold text-xl uppercase tracking-wider text-white">OMADACRAFT</span>
        </a>

        <div class="flex items-center gap-6">
            <div class="flex space-x-1">
                {{ range .Site.Menus.main }}
                <a class="nav-link-desktop" href="{{ .URL | relURL }}">{{ .Name }}</a>
                {{ end }}
                <a class="nav-link-desktop rainbow-text" href="https://gpt.omadacraft.net/?utm_campaign=omadacraft.net">OmadaGPT</a>
            </div>
        </div>

        <!-- STATUS + IP BUTTON -->
        <div class="flex items-center gap-3">
            <!-- SERVER STATUS -->
            <div class="flex items-center gap-2 bg-white/5 border border-white/10 rounded-xl px-3 py-2">
                <span class="status-dot w-2 h-2 rounded-full bg-slate-500"></span>
                <span class="status-text text-[9px] font-black uppercase tracking-widest text-slate-500">
                    Prüfe...
                </span>
                <span class="player-count text-blue-400 font-black text-[9px] italic uppercase whitespace-nowrap">
                    ...
                </span>
            </div>

            <!-- IP BUTTON -->
            <button onclick="copyIP(this)"
                class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-[10px] uppercase shadow-lg active:scale-95 transition-all">
                IP KOPIEREN
            </button>
        </div>
    </nav>

    <!-- MOBILE NAV (UNVERÄNDERT) -->
    <div class="mobile-nav-root hidden md:hidden">
        <div class="mbl-card-frame">
            <div class="flex items-center justify-between p-4 border-b border-white/5">
                <button class="w-9 h-9 bg-white/5 rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-lg">menu</span>
                </button>
                <span class="font-black text-sm text-white italic uppercase tracking-widest">OMADACRAFT</span>
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-sm">shield</span>
                </div>
            </div>

            <div class="flex justify-between items-center px-6 py-2.5 bg-blue-500/5">
                <div class="flex items-center gap-2">
                    <span class="status-dot w-2 h-2 rounded-full bg-slate-500"></span>
                    <span class="status-text text-[9px] font-black uppercase text-slate-500 tracking-widest">
                        Prüfe...
                    </span>
                </div>
                <span class="player-count text-blue-400 font-black text-[9px] italic uppercase">
                    ...
                </span>
            </div>
        </div>
    </div>

</div>

<script>
async function updateStatus() {
    const dots = document.querySelectorAll('.status-dot');
    const texts = document.querySelectorAll('.status-text');
    const players = document.querySelectorAll('.player-count');

    function setState(dotClass, text, color, playerText) {
        dots.forEach(d => d.className = `status-dot w-2 h-2 rounded-full ${dotClass}`);
        texts.forEach(t => { t.innerText = text; t.style.color = color; });
        players.forEach(p => p.innerText = playerText);
    }

    try {
        const res = await fetch("https://api.mcstatus.io/v2/status/java/omadacraft.net");
        const data = await res.json();

        if (data.online && data.players?.online > 0) {
            setState("bg-emerald-500 animate-pulse", "ONLINE", "#10b981", `${data.players.online} SPIELER`);
        } else if (data.online) {
            setState("bg-yellow-400", "LEER", "#facc15", "0 SPIELER");
        } else {
            setState("bg-red-500", "OFFLINE", "#ef4444", "SERVER OFFLINE");
        }
    } catch {
        setState("bg-red-500", "OFFLINE", "#ef4444", "API FEHLER");
    }
}

function copyIP(btn) {
    navigator.clipboard.writeText("omadacraft.net");
    const original = btn.innerText;
    btn.innerText = "KOPIERT!";
    setTimeout(() => btn.innerText = original, 2000);
}

updateStatus();
setInterval(updateStatus, 30000);
</script>

</body>
</html>
