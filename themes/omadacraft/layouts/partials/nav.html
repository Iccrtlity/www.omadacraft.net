            <a class="text-slate-300 hover:text-white block px-3 py-4 rounded-md text-base font-medium border-b border-white/5 last:border-none" href="{{ .URL }}">
                {{ .Name }}

<script>
    // IP Kopieren Funktion
    function copyIP(btn) {
        const serverIP = 'omadacraft.net';
        navigator.clipboard.writeText(serverIP).then(() => {
            const span = document.getElementById('ip-text') || btn.querySelector('span:last-child');
            const originalText = span.innerText;
            
            span.innerText = "KOPIERT!";
            btn.classList.add('!bg-green-600');
            
            setTimeout(() => {
                span.innerText = originalText;
                btn.classList.remove('!bg-green-600');
            }, 2000);
        });
    }
    
    // Navbar Scroll Effekt
    window.addEventListener('scroll', () => {
        const nav = document.getElementById('navbar');
        if (window.scrollY > 20) {
            nav.classList.add('bg-dark-900/95', 'py-1', 'shadow-2xl');
        } else {
            nav.classList.remove('bg-dark-900/95', 'py-1', 'shadow-2xl');
        }
    });

    // Server Status API (MCSrvStat)
    document.addEventListener("DOMContentLoaded", function() {
        const serverIp = "omadacraft.net"; 
        const apiUrl = "https://api.mcsrvstat.us/2/" + serverIp;

        const navStatusText = document.getElementById("nav-status-text");
        const navStatusDot = document.getElementById("nav-status-dot");
        const playerCount = document.getElementById("player-count");

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.online) {
                    navStatusText.innerText = "Online";
                    navStatusDot.className = "w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]";
                    playerCount.innerText = data.players.online + " Spieler online";
                } else {
                    navStatusText.innerText = "Offline";
                    navStatusDot.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]";
                    playerCount.innerText = "Wartungsarbeiten";
                }
            })
            .catch(error => {
                console.error("Status Fehler:", error);
                navStatusText.innerText = "Status unbekannt";
            });
    });

    // Suche Shortcut Support
    window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            if (typeof openSearch === "function") openSearch();
        }
    });
</script>
