<nav class="fixed w-full z-50 transition-all duration-300 bg-white/90 dark:bg-[#0a0a0a]/80 backdrop-blur-md border-b border-slate-200 dark:border-white/5" id="navbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
            
            <a class="flex items-center gap-3 group" href="/">
                <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center shadow-lg transition-transform group-hover:scale-110">
                    <span class="material-symbols-outlined text-white">shield</span>
                </div>
                <span class="font-bold text-2xl text-slate-900 dark:text-white group-hover:text-brand-400 transition-colors uppercase tracking-wider">OMADACRAFT</span>
            </a>
            
            <div class="hidden md:flex items-center gap-6">
                <div class="flex space-x-1">
                    {{ range .Site.Menus.main }}
                    <a class="text-slate-600 dark:text-slate-400 hover:text-brand-500 dark:hover:text-white px-3 py-2 text-sm font-bold transition-colors uppercase tracking-tight" href="{{ .URL }}">
                        {{ .Name }}
                    </a>
                    {{ end }}
                </div>

                <button onclick="openSearch()" class="flex items-center gap-3 px-4 py-2 rounded-full bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-500 dark:text-slate-400 hover:border-brand-500/50 transition-all group">
                    <span class="material-symbols-outlined text-lg">search</span>
                    <span class="text-[11px] font-black uppercase tracking-widest">Suche</span>
                    <div class="hidden lg:flex items-center bg-white dark:bg-white/10 border border-slate-300 dark:border-white/20 px-1.5 py-0.5 rounded-lg shadow-sm">
                        <span class="text-[10px] font-sans font-bold opacity-60">⌘ K</span>
                    </div>
                </button>
            </div>

            <div class="hidden md:flex items-center gap-4">
                <div class="text-right mr-2 leading-tight">
                    <div class="text-[10px] text-brand-500 font-black uppercase flex items-center gap-2 justify-end">
                        <span class="w-2 h-2 rounded-full bg-gray-400" id="nav-status-dot"></span>
                        <span id="nav-status-text">Lade...</span>
                    </div>
                    <div class="text-[11px] text-slate-500 dark:text-slate-400 font-mono font-bold" id="player-count">...</div>
                </div>
                
                <button class="bg-brand-600 hover:bg-brand-500 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-lg flex items-center gap-2 transition-all active:scale-95 uppercase tracking-wider" onclick="copyIP(this)">
                    <span class="material-symbols-outlined text-base">content_copy</span>
                    <span id="ip-text">IP</span>
                </button>

                <a href="https://discord.gg/sBfHrvhTWB" target="_blank" class="bg-[#5865F2] hover:bg-[#4752c4] text-white px-4 py-2 rounded-xl font-bold transition-all text-xs flex items-center gap-2 shadow-lg uppercase tracking-wider">
                    <i class="fa-brands fa-discord text-base"></i>
                    <span>Discord</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<script>
    function copyIP(btn) {
        navigator.clipboard.writeText('omadacraft.net').then(() => {
            const span = document.getElementById('ip-text');
            span.innerText = "KOPIERT!";
            btn.classList.add('!bg-emerald-600');
            setTimeout(() => { span.innerText = "IP"; btn.classList.remove('!bg-emerald-600'); }, 2000);
        });
    }

    // Server Status Logik
    async function updateStatus() {
        try {
            const r = await fetch("https://api.mcsrvstat.us/2/omadacraft.net");
            const data = await r.json();
            const text = document.getElementById("nav-status-text");
            const dot = document.getElementById("nav-status-dot");
            const count = document.getElementById("player-count");
            
            if (data.online) {
                text.innerText = "Online";
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]";
                count.innerText = data.players.online + " Spieler";
            } else {
                text.innerText = "Offline";
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                count.innerText = "Wartungsarbeiten";
            }
        } catch(e) { console.error(e); }
    }
    updateStatus();
</script>
