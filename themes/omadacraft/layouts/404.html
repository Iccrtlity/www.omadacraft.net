{{ define "main" }}
<section class="relative min-h-screen bg-[#0a0c10] flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808008_1px,transparent_1px),linear-gradient(to_bottom,#80808008_1px,transparent_1px)] bg-[size:40px_40px]"></div>
        <div class="absolute top-1/4 left-1/4 w-1 h-1 bg-white rounded-full animate-pulse"></div>
        <div class="absolute bottom-1/3 right-1/4 w-[2px] h-[2px] bg-brand-500 rounded-full animate-pulse"></div>
    </div>

    <div class="relative z-10 text-center px-4">
        <div class="relative inline-block mb-8">
            <div class="absolute inset-0 bg-brand-500/20 blur-3xl rounded-full"></div>
            <h1 class="relative text-[12rem] md:text-[15rem] font-display font-black text-white leading-none tracking-tighter opacity-10">
                404
            </h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="material-symbols-outlined text-8xl text-brand-400 animate-bounce">
                    explore_off
                </span>
            </div>
        </div>

        <h2 class="text-3xl md:text-4xl font-display font-bold text-white mb-4 uppercase tracking-tight">
            Verlaufen?
        </h2>
        <p class="text-slate-400 max-w-md mx-auto mb-12 text-lg font-light">
            Diese Seite existiert nicht oder wurde in eine andere Dimension verschoben.
        </p>

        <a href="/" class="inline-flex items-center gap-3 bg-white/5 hover:bg-brand-500 border border-white/10 hover:border-brand-400 text-white px-8 py-4 rounded-2xl font-bold transition-all duration-300 group">
            <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
            Zurück zum Netzwerk
        </a>
    </div>
</section>
{{ end }}
