{{ define "main" }}
<section class="relative min-h-screen bg-white dark:bg-[#0a0c10] flex items-center justify-center overflow-hidden transition-colors duration-500">
    
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#0000000a_1px,transparent_1px),linear-gradient(to_bottom,#0000000a_1px,transparent_1px)] dark:bg-[linear-gradient(to_right,#80808008_1px,transparent_1px),linear-gradient(to_bottom,#80808008_1px,transparent_1px)] bg-[size:32px_32px] md:bg-[size:40px_40px]"></div>
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-brand-500/10 dark:bg-brand-600/5 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative z-10 text-center px-6 w-full max-w-2xl">
        
        <div class="relative inline-block mb-10 md:mb-14">
            <div class="absolute inset-0 bg-brand-500/20 dark:bg-brand-500/10 blur-3xl rounded-full"></div>
            
            <h1 class="relative text-[9rem] sm:text-[12rem] md:text-[16rem] font-display font-black text-slate-300/60 dark:text-white dark:opacity-10 leading-none tracking-tighter select-none transition-colors duration-500">
                404
            </h1>
            
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="material-symbols-outlined text-[7.5rem] md:text-[11.5rem] text-brand-600 dark:text-brand-400 animate-float-heavy drop-shadow-2xl md:drop-shadow-[0_0_35px_rgba(0,132,255,0.4)]">
                    explore_off
                </span>
            </div>
        </div>

        <div class="space-y-4 mb-12">
            <h2 class="text-4xl md:text-5xl font-display font-bold text-slate-900 dark:text-white uppercase tracking-tight italic">
                Verlaufen?
            </h2>
            <p class="text-slate-600 dark:text-slate-400 max-w-xs md:max-w-md mx-auto text-lg md:text-xl font-medium leading-relaxed">
                Diese Seite existiert nicht oder wurde in eine <span class="text-brand-600 dark:text-brand-400">andere Dimension</span> verschoben.
            </p>
        </div>

        <div class="px-4 sm:px-0">
            <a href="/" class="inline-flex items-center justify-center gap-3 w-full sm:w-auto bg-slate-100 dark:bg-white/5 hover:bg-brand-600 hover:text-white border border-slate-200 dark:border-white/10 hover:border-brand-500 text-slate-900 dark:text-white px-10 py-5 rounded-2xl font-black uppercase text-sm tracking-widest transition-all duration-300 group shadow-lg hover:shadow-brand-500/30 active:scale-95">
                <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Zurück zum Netzwerk
            </a>
        </div>
        
    </div>
</section>

<style>
    @keyframes float-heavy {
        0%, 100% { transform: translateY(-10px) rotate(-4deg); }
        50% { transform: translateY(10px) rotate(4deg); }
    }
    .animate-float-heavy {
        animation: float-heavy 4.5s ease-in-out infinite;
    }
</style>
{{ end }}
