{{ define "main" }}
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<section class="relative min-h-screen bg-[#05070a] flex items-center justify-center overflow-hidden font-sans">
    
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 opacity-20 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:4rem_4rem] [perspective:1000px]">
            <div class="absolute inset-0 bg-gradient-to-t from-[#05070a] via-transparent to-transparent z-10"></div>
            <div class="absolute inset-0 animate-grid-flow"></div>
        </div>

        <div class="absolute top-1/4 -left-20 w-96 h-96 bg-brand-600/20 blur-[120px] rounded-full animate-pulse"></div>
        <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-indigo-600/20 blur-[120px] rounded-full animate-pulse" style="animation-delay: 2s"></div>
    </div>

    <div class="absolute inset-0 pointer-events-none z-10 opacity-[0.03] bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,118,0.06))] bg-[size:100%_4px,3px_100%]"></div>

    <div class="relative z-20 text-center px-6">
        
        <div class="relative inline-block mb-16 group">
            <div class="absolute -inset-8 bg-brand-500/10 blur-3xl rounded-full group-hover:bg-brand-500/20 transition-all duration-700 animate-pulse"></div>
            
            <div class="relative">
                <h1 class="text-[10rem] sm:text-[15rem] md:text-[20rem] font-black leading-none tracking-[ -0.05em] select-none italic flex justify-center items-center">
                    <span class="cyber-glitch text-white opacity-5" data-text="404">404</span>
                </h1>
                
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="relative">
                        <div class="absolute inset-0 bg-brand-500 blur-2xl opacity-20 animate-ping"></div>
                        <span class="material-symbols-outlined text-[8rem] md:text-[12rem] text-brand-500 animate-portal drop-shadow-[0_0_50px_rgba(0,132,255,0.8)]">
                            emergency_home
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-6 mb-12 relative" data-aos="fade-up">
            <div class="inline-block px-3 py-1 bg-brand-500/10 border border-brand-500/20 rounded-full mb-4">
                <span class="text-brand-500 text-[10px] uppercase font-black tracking-[0.4em] animate-pulse">System Error: Node Not Found</span>
            </div>
            <h2 class="text-5xl md:text-7xl font-black text-white uppercase italic tracking-tighter leading-none">
                DIMENSION <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-indigo-400">UNREACHABLE</span>
            </h2>
            <p class="text-slate-400 max-w-lg mx-auto text-lg md:text-xl font-medium tracking-wide">
                Der angeforderte Pfad wurde aus der <span class="text-white border-b border-brand-500/50">Core-Infrastruktur</span> gelöscht oder existiert in einer parallelen Instanz.
            </p>
        </div>

        <div data-aos="zoom-in" data-aos-delay="400">
            <a href="/" class="group relative inline-flex items-center justify-center px-12 py-6 overflow-hidden font-black border-2 border-brand-500/30 rounded-2xl transition-all duration-300 hover:border-brand-500">
                <div class="absolute inset-0 w-0 bg-brand-500 transition-all duration-[0.4s] ease-out group-hover:w-full"></div>
                <span class="relative flex items-center gap-3 text-white uppercase tracking-[0.2em] text-sm">
                    <span class="material-symbols-outlined group-hover:rotate-[-45deg] transition-transform duration-300">rocket_launch</span>
                    Zurück zum Mainframe
                </span>
            </a>
        </div>
        
    </div>
</section>

<style>
    /* 1. GRID FLOW ANIMATION (PERSPEKTIVE) */
    @keyframes grid-flow {
        0% { transform: translateY(0); }
        100% { transform: translateY(4rem); }
    }
    .animate-grid-flow {
        background-image: linear-gradient(to bottom, #1e293b 1px, transparent 1px);
        background-size: 100% 4rem;
        animation: grid-flow 3s linear infinite;
        mask-image: linear-gradient(to top, rgba(0,0,0,1), transparent);
    }

    /* 2. CYBER PORTAL FLOAT */
    @keyframes portal {
        0%, 100% { transform: scale(1) translateY(-10px) rotate(-5deg); filter: hue-rotate(0deg) brightness(1); }
        50% { transform: scale(1.1) translateY(10px) rotate(5deg); filter: hue-rotate(15deg) brightness(1.3); }
    }
    .animate-portal {
        animation: portal 4s ease-in-out infinite;
    }

    /* 3. HARD CORE GLITCH TEXT */
    .cyber-glitch {
        position: relative;
        display: inline-block;
    }
    .cyber-glitch::before, .cyber-glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #05070a;
    }
    .cyber-glitch:hover::before {
        left: 2px;
        text-shadow: -2px 0 #ff00c1;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
    }
    .cyber-glitch:hover::after {
        left: -2px;
        text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
        animation: glitch-anim2 1s infinite linear alternate-reverse;
    }
    @keyframes glitch-anim {
        0% { clip: rect(31px, 9999px, 94px, 0); }
        20% { clip: rect(62px, 9999px, 42px, 0); }
        /* ... more steps ... */
        100% { clip: rect(89px, 9999px, 98px, 0); }
    }
    @keyframes glitch-anim2 {
        0% { clip: rect(10px, 9999px, 85px, 0); }
        100% { clip: rect(50px, 9999px, 15px, 0); }
    }
</style>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ once: true });
</script>
{{ end }}
