{{ define "main" }}

<header class="relative min-h-[85vh] flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0">
        <img alt="OmadaCraft Background" class="w-full h-full object-cover" src="/images/background.png"/>
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-dark-900 via-dark-900/80 to-transparent"></div>
    </div>
    
    <div class="relative z-10 text-center px-4 max-w-4xl mx-auto mt-16">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-300 mb-6 animate-float">
            <span class="material-symbols-outlined text-sm">rocket_launch</span>
            <span class="text-sm font-bold tracking-wide">SEASON 1 IST LIVE!</span>
        </div>
        <h1 class="text-5xl md:text-7xl font-display font-bold text-white mb-6 drop-shadow-2xl">
            DEIN <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-indigo-500">ABENTEUER</span> BEGINNT
        </h1>
        <p class="text-lg md:text-xl text-slate-300 mb-10 max-w-2xl mx-auto leading-relaxed">
            Willkommen auf OmadaCraft. Tauche ein in eine Welt voller Innovation, einzigartiger Spielmodi und einer starken Community.
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
            <button class="group relative px-8 py-4 bg-brand-600 hover:bg-brand-500 text-white font-bold text-lg rounded-xl shadow-[0_0_20px_rgba(14,165,233,0.3)] hover:shadow-[0_0_30px_rgba(14,165,233,0.5)] transition-all transform hover:-translate-y-1 w-full sm:w-auto overflow-hidden" onclick="navigator.clipboard.writeText('omadacraft.net')">
                <span class="relative flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">play_arrow</span> OMADACRAFT.NET
                </span>
            </button>
        </div>
    </div>
</header>

{{ partial "howto.html" . }}

{{ end }}
