<!DOCTYPE html>
<html lang="de" class="scroll-smooth dark"> 
<head>
    {{ partial "head.html" . }}
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0a', 800: '#111111' },
                        brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    }
                }
            }
        }
    </script>
    <link rel="icon" href="/path/to/favicon.ico">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-dark-900 dark:text-slate-200 font-sans selection:bg-brand-500 selection:text-white overflow-x-hidden transition-colors duration-500">
    
    {{ partial "nav.html" . }}

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    <button onclick="toggleTheme()" id="theme-toggle-btn"
            class="fixed bottom-6 right-6 z-[99] w-14 h-14 rounded-2xl bg-white dark:bg-dark-800 backdrop-blur-xl border border-slate-200 dark:border-white/10 shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all group">
        <span id="theme-icon-float" class="material-symbols-outlined text-2xl text-slate-700 dark:text-yellow-400">light_mode</span>
    </button>

    <div id="search-modal" class="fixed inset-0 z-[100] hidden animate-in fade-in duration-200">
        <div class="absolute inset-0 bg-slate-900/60 dark:bg-[#0a0a0a]/90 backdrop-blur-md" onclick="closeSearch()"></div>
        <div class="relative max-w-2xl mx-auto mt-24 px-4">
            <div class="bg-white dark:bg-[#111111] border border-slate-200 dark:border-white/10 rounded-3xl shadow-2xl overflow-hidden">
                <div class="p-6 border-b border-slate-100 dark:border-white/5 flex items-center gap-4">
                    <span class="material-symbols-outlined text-brand-500 text-2xl">search</span>
                    <input type="text" id="search-input" placeholder="Nach Inhalten suchen..." class="bg-transparent border-none outline-none text-slate-900 dark:text-white w-full text-lg focus:ring-0">
                    <button onclick="closeSearch()" class="material-symbols-outlined text-slate-400 hover:text-red-500 transition-colors">close</button>
                </div>
                <div id="search-results" class="max-h-[450px] overflow-y-auto p-4 bg-slate-50 dark:bg-black/20">
                    <div class="py-12 text-center text-slate-400 italic">Tippe etwas ein...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
    function applyTheme() {
        const saved = localStorage.getItem('omada-theme') || 'dark';
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon-float');
        if (saved === 'light') {
            html.classList.remove('dark');
            if(icon) icon.innerText = 'dark_mode';
        } else {
            html.classList.add('dark');
            if(icon) icon.innerText = 'light_mode';
        }
    }
    function toggleTheme() {
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('omada-theme', isDark ? 'light' : 'dark');
        applyTheme();
    }
    applyTheme();

    let searchIndex = null;
    async function openSearch() {
        document.getElementById('search-modal').classList.remove('hidden');
        document.getElementById('search-input').focus();
        if (!searchIndex) {
            try {
                const response = await fetch('/index.json');
                searchIndex = await response.json();
            } catch (err) { console.error("Search index error:", err); }
        }
    }
    function closeSearch() { document.getElementById('search-modal').classList.add('hidden'); }
    
    document.getElementById('search-input').addEventListener('input', function(e) {
        const q = e.target.value.toLowerCase().trim();
        const res = document.getElementById('search-results');
        if (q.length < 1) { res.innerHTML = ''; return; }
        const matches = searchIndex.filter(p => p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q));
        res.innerHTML = matches.map(p => `
            <a href="${p.permalink}" class="block p-4 rounded-xl border border-slate-200 dark:border-white/5 bg-white dark:bg-white/5 hover:bg-brand-500/10 mb-2 transition-all">
                <div class="font-bold text-slate-900 dark:text-white">${p.title}</div>
                <div class="text-xs text-slate-500 line-clamp-1">${p.content}</div>
            </a>
        `).join('');
    });
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeSearch();
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
    });
    </script>
</body>
</html>
